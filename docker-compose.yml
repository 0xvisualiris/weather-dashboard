version: '3.8'

services:
  weather:
    # Ersetze DEIN-GITHUB-USERNAME mit deinem GitHub-Benutzernamen (Kleinbuchstaben)
    image: ghcr.io/0xvisualiris/weather-dashboard:latest
    container_name: weather-dashboard
    restart: unless-stopped
    ports:
      - "5431:5431"
    volumes:
      - weather_data:/data
    environment:
      - TZ=Europe/Berlin

volumes:
  weather_data:
